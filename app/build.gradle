plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id'jacoco'
    id 'java'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    //Json
    implementation 'com.google.code.gson:gson:2.10.1'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'App'
}

jacoco {
    toolVersion = "0.8.12" // Versão estável para Java 21
}

// 2. Personalizando a geração do relatório
jacocoTestReport {
    dependsOn test // Garante que os testes rodam antes de tentar gerar o relatório
    
    reports {
        xml.required = true  // Útil para integração com SonarQube/CI
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco')
    }

    //Configuração adicionada para ignorar os métodos e classes exclusivos para print na contagem de cobertura de código
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/Prints/**',
            ])
        }))
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

run {
    standardInput = System.in
}

javadoc {
    destinationDir = file(layout.buildDirectory.dir("docs/javadoc"))
    options.memberLevel = JavadocMemberLevel.PRIVATE
}